# .github/workflows/ci.yml — generated by Stacktora
# Proves the generated stack actually builds and every healthcheck passes.
name: bootstrap-ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Seed .env
        run: cp .env.example .env

      - name: Build & start the stack
        run: docker compose up -d --build

      - name: Wait for healthchecks
        run: |
          deadline=$((SECONDS+180))
          while true; do
            pending=0
            for cid in $(docker compose ps -q); do
              status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid")
              if [ "$status" = "starting" ] || [ "$status" = "unhealthy" ]; then pending=$((pending+1)); fi
            done
            [ "$pending" -eq 0 ] && { echo "all healthchecked services are healthy"; break; }
            [ "$SECONDS" -ge "$deadline" ] && { echo "timed out waiting for health"; docker compose ps; docker compose logs; exit 1; }
            sleep 4
          done

      - name: Service status
        run: docker compose ps

      - name: Tear down
        if: always()
        run: docker compose down -v
