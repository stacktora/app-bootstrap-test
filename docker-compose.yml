# docker-compose.yml — generated by Stacktora
# Stack: Ruby 3.3 + PostgreSQL, Redis
# Run:  docker compose up   (app waits for healthy dependencies)

services:
  app:
    image: ruby:3.3-slim
    working_dir: /app
    command: bundle exec rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./:/app          # hot-reload: edits on host reload in container
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # healthcheck:  # uncomment once your app exposes a health endpoint
    #   test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  worker:
    image: ruby:3.3-slim
    working_dir: /app
    command: bundle exec sidekiq
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: "app"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # seed schema on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
